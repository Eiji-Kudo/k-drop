name: v2 CI

on:
  push:
    branches: [main]
    paths: ['app/v2/**']
  pull_request:
    branches: [main]
    paths: ['app/v2/**']
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    defaults:
      run:
        working-directory: app/v2
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: app/v2/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: app/v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Run type check
        run: pnpm run test:types

      - name: Run lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Build
        run: pnpm run build
